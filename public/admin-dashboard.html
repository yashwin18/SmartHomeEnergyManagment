<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
display:flex;
height:100vh;
background:#f5f7fa;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:linear-gradient(180deg,#00c9a7,#00a78e);
color:white;
padding:30px 20px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:12px;
cursor:pointer;
border-radius:8px;
margin-bottom:8px;
}

.sidebar li:hover{
background:rgba(255,255,255,0.2);
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h3{
margin-bottom:10px;
color:#666;
}

.card p{
font-size:26px;
color:#00a78e;
}

/* CHART */

.chart-box{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
width:500px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<ul>
<li onclick="go('admin-dashboard.html')">Dashboard</li>
<li onclick="go('admin-users.html')">Users</li>
<li onclick="go('admin-devices.html')">Devices</li>
<li onclick="go('admin-analytics.html')">Energy Analytics</li>
<li onclick="go('admin-logs.html')">System Logs</li>
<li onclick="go('admin-settings.html')">Settings</li>
<li onclick="logout()">Logout</li>
</ul>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">0</p>
</div>

<div class="card">
<h3>Admins</h3>
<p id="adminCount">0</p>
</div>

<div class="card">
<h3>Homeowners</h3>
<p id="homeCount">0</p>
</div>

<div class="card">
<h3>Technicians</h3>
<p id="techCount">0</p>
</div>

</div>

<div class="chart-box">

<h3>User Roles Distribution</h3>

<canvas id="userChart"></canvas>

</div>

</div>

<script>

function go(page){
window.location.href=page
}

function logout(){
localStorage.removeItem("token")
window.location.href="login.html"
}

const token = localStorage.getItem("token")

async function loadDashboard(){

const res = await fetch("/admin/users",{
headers:{
Authorization:"Bearer "+token
}
})

const users = await res.json()

let admin=0
let homeowner=0
let technician=0

users.forEach(u=>{
if(u.role==="admin") admin++
if(u.role==="homeowner") homeowner++
if(u.role==="technician") technician++
})

document.getElementById("totalUsers").innerText = users.length
document.getElementById("adminCount").innerText = admin
document.getElementById("homeCount").innerText = homeowner
document.getElementById("techCount").innerText = technician

/* GRAPH */

new Chart(document.getElementById("userChart"),{

type:"pie",

data:{
labels:["Admin","Homeowner","Technician"],
datasets:[{
data:[admin,homeowner,technician],
backgroundColor:[
"#00c9a7",
"#3498db",
"#f39c12"
]
}]
}

})

}

loadDashboard()

</script>

</body>
</html>
